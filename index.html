<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>자산 QR 스캐너</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #0f172a; color: #f1f5f9;
      min-height: 100vh; padding: 12px;
      user-select: none; -webkit-user-select: none;
    }
    h1 { font-size: 18px; margin-bottom: 10px; text-align: center; }
    #count {
      text-align: center; font-size: 13px; color: #94a3b8;
      margin-bottom: 10px; padding: 8px;
      background: #1e293b; border-radius: 8px;
    }
    #count .new { color: #4ade80; font-weight: 700; }
    #count .dup { color: #f87171; font-weight: 700; }
    #status {
      padding: 16px 12px; border-radius: 12px; margin-bottom: 12px;
      text-align: center; font-size: 16px; font-weight: 600;
      transition: background-color 0.2s; min-height: 56px;
      display: flex; align-items: center; justify-content: center;
      word-break: break-all;
    }
    .status-idle { background: #334155; }
    .status-success { background: #16a34a; }
    .status-duplicate { background: #dc2626; }
    .status-error { background: #ea580c; }
    .status-sending { background: #0ea5e9; }
    #reader {
      width: 100%; max-width: 500px; margin: 0 auto 12px;
      border-radius: 12px; overflow: hidden; background: #1e293b;
    }
    #reader video { border-radius: 12px; }
    #log {
      background: #1e293b; border-radius: 12px; padding: 8px;
      max-height: 40vh; overflow-y: auto; font-size: 13px;
    }
    .log-item {
      padding: 8px; border-bottom: 1px solid #334155;
      display: grid; grid-template-columns: 60px 1fr auto; gap: 8px;
      align-items: center;
    }
    .log-item:last-child { border-bottom: none; }
    .log-new { color: #4ade80; font-weight: 600; }
    .log-dup { color: #f87171; font-weight: 600; }
    .log-time { color: #64748b; font-size: 11px; }
    .log-id { font-family: ui-monospace, SFMono-Regular, monospace; font-weight: 600; }
    #controls {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    button {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: #334155; color: #f1f5f9;
    }
    button:active { background: #1e293b; }
    button.danger { background: #dc2626; }
    .empty-log { text-align: center; color: #64748b; padding: 20px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>🐣 자산 QR 스캐너</h1>
  <div id="count">
    총 <span id="cnt-total">0</span>개
    (<span class="new">신규 <span id="cnt-new">0</span></span> /
    <span class="dup">중복 <span id="cnt-dup">0</span></span>)
  </div>
  <div id="status" class="status-idle">QR을 화면 가운데에 대주이소 🐣</div>
  <div id="reader"></div>
  <div id="controls">
    <button id="btn-clear">로그 지우기</button>
    <button id="btn-export">CSV 다운로드</button>
  </div>
  <div id="log"><div class="empty-log">아직 스캔된 자산이 없습니더</div></div>

  <script>
    // 츄릭핑 형이 배포한 Apps Script 웹앱 URL을 여기에 붙여넣으소
    const WEBAPP_URL = 'REPLACE_WITH_APPS_SCRIPT_URL';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const cntTotal = document.getElementById('cnt-total');
    const cntNew = document.getElementById('cnt-new');
    const cntDup = document.getElementById('cnt-dup');

    let stats = { total: 0, new: 0, dup: 0 };
    let history = []; // {id, result, time}
    let lastScan = { id: null, time: 0 };
    const DEDUP_WINDOW_MS = 2000; // 같은 QR 연속 스캔 방지 (클라이언트 측)
    let busy = false;

    function updateCount() {
      cntTotal.textContent = stats.total;
      cntNew.textContent = stats.new;
      cntDup.textContent = stats.dup;
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    function addLog(id, result) {
      if (logEl.querySelector('.empty-log')) logEl.innerHTML = '';
      const item = document.createElement('div');
      item.className = 'log-item';
      const cls = result === 'duplicate' ? 'log-dup' : 'log-new';
      const icon = result === 'duplicate' ? '⚠️ 중복' : '✅ 신규';
      const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
      item.innerHTML = `
        <span class="${cls}">${icon}</span>
        <span class="log-id">${id}</span>
        <span class="log-time">${time}</span>
      `;
      logEl.insertBefore(item, logEl.firstChild);
      history.push({ id, result, time });
    }

    function beep(success) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = success ? 880 : 220;
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) { /* ignore */ }
    }

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    async function sendToSheet(id) {
      try {
        // Apps Script 웹앱은 text/plain으로 POST하면 CORS preflight를 피할 수 있슴
        const res = await fetch(WEBAPP_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ id }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        return { status: 'error', msg: e.message };
      }
    }

    async function onScan(decodedText) {
      if (busy) return;
      const raw = (decodedText || '').trim();
      if (!raw) return;

      // 만약 QR이 URL이어도 숫자만 뽑아냄 (뒤에 붙은 ID 패턴 우선)
      const idMatch = raw.match(/(\d{4,})/);
      const id = idMatch ? idMatch[1] : raw;

      const now = Date.now();
      if (lastScan.id === id && now - lastScan.time < DEDUP_WINDOW_MS) return;
      lastScan = { id, time: now };
      busy = true;

      setStatus(`📡 전송 중: ${id}`, 'status-sending');
      const result = await sendToSheet(id);

      if (result.status === 'ok') {
        setStatus(`✅ 신규 등록: ${id}`, 'status-success');
        beep(true); vibrate(80);
        stats.total++; stats.new++;
        addLog(id, 'new');
      } else if (result.status === 'duplicate') {
        setStatus(`⚠️ 이미 등록됨: ${id}`, 'status-duplicate');
        beep(false); vibrate([60, 40, 60]);
        stats.total++; stats.dup++;
        addLog(id, 'duplicate');
      } else {
        setStatus(`❌ 오류: ${result.msg || 'unknown'} (${id})`, 'status-error');
        beep(false); vibrate([100, 60, 100, 60, 100]);
      }
      updateCount();

      // 0.6초 쿨다운 후 다음 스캔 대기
      setTimeout(() => {
        busy = false;
        if (statusEl.className !== 'status-error') {
          setStatus('다음 QR 스캔 대기 중 🐣', 'status-idle');
        }
      }, 600);
    }

    document.getElementById('btn-clear').onclick = () => {
      if (!confirm('로그를 지울까예? (시트 데이터는 안 지워집니더)')) return;
      history = [];
      stats = { total: 0, new: 0, dup: 0 };
      updateCount();
      logEl.innerHTML = '<div class="empty-log">아직 스캔된 자산이 없습니더</div>';
    };

    document.getElementById('btn-export').onclick = () => {
      if (!history.length) { alert('내보낼 기록이 없습니더'); return; }
      const csv = ['자산ID,결과,시각']
        .concat(history.map(h => `${h.id},${h.result === 'duplicate' ? '중복' : '신규'},${h.time}`))
        .join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `asset-scan-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    };

    // 스캐너 시작
    const scanner = new Html5Qrcode('reader');
    const config = {
      fps: 10,
      qrbox: { width: 260, height: 260 },
      aspectRatio: 1.333,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
      ],
    };

    scanner.start({ facingMode: 'environment' }, config, onScan, () => {})
      .catch(err => {
        setStatus(`❌ 카메라 시작 실패: ${err}`, 'status-error');
      });

    // WEBAPP_URL 미설정 경고
    if (WEBAPP_URL.includes('REPLACE_WITH')) {
      setTimeout(() => {
        setStatus('⚠️ WEBAPP_URL 설정 필요 (index.html 상단)', 'status-error');
      }, 1500);
    }
  </script>
</body>
</html>
